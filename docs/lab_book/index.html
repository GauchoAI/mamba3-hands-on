<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab Book</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #171512;
      --muted: #686058;
      --line: #d8d0c4;
      --paper: #fffdf8;
      --soft: #f4efe6;
      --panel: #fff;
      --accent: #0f766e;
      --gold: #b7791f;
      --good: #15803d;
      --warn: #b45309;
      --bad: #b91c1c;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.45;
    }
    .layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      min-width: 0;
      min-height: 100vh;
    }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      min-width: 0;
      padding: 28px 20px;
      border-right: 1px solid var(--line);
      background: #faf6ee;
      overflow-y: auto;
    }
    main {
      max-width: 1240px;
      min-width: 0;
      width: 100%;
      padding: 34px clamp(20px, 4vw, 56px) 80px;
    }
    h1, h2, h3 {
      margin: 0;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    h1, h2 { font-family: var(--serif); }
    h1 {
      font-size: 40px;
      line-height: 1.02;
    }
    h2 {
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.03;
      margin-bottom: 12px;
    }
    h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }
    p { margin: 0; }
    .subtitle, .muted {
      color: var(--muted);
    }
    .subtitle {
      margin-top: 8px;
      font-size: 13px;
    }
    .toc {
      display: grid;
      gap: 5px;
      margin-top: 28px;
    }
    .toc a {
      border-left: 3px solid transparent;
      color: var(--ink);
      display: block;
      padding: 8px 10px;
      text-decoration: none;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .toc a:hover {
      background: #eee7db;
      border-left-color: var(--accent);
    }
    .toc-group {
      border: 1px solid transparent;
      border-radius: 8px;
    }
    .toc-group summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      list-style: none;
      padding: 8px 10px 4px;
      text-transform: uppercase;
    }
    .toc-group summary::-webkit-details-marker { display: none; }
    .toc-group summary::before {
      content: "+";
      display: inline-block;
      width: 14px;
      color: var(--accent);
    }
    .toc-group[open] summary::before { content: "-"; }
    .toc-group-count {
      color: #958b7f;
      font-weight: 500;
      margin-left: 4px;
    }
    .toc-group-body {
      display: grid;
      gap: 2px;
      padding-bottom: 4px;
    }
    .toc-sub a {
      font-size: 12px;
      padding-left: 20px;
    }
    .tools {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }
    input, button {
      border: 1px solid var(--line);
      border-radius: 7px;
      font: inherit;
      padding: 10px 11px;
    }
    input { width: 100%; background: #fff; }
    button {
      background: #fff;
      cursor: pointer;
    }
    button.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }
    .load-meta {
      margin-top: 18px;
      color: var(--muted);
      font: 12px/1.5 var(--mono);
      overflow-wrap: anywhere;
    }
    .chapter {
      padding: 34px 0 54px;
      border-bottom: 1px solid var(--line);
    }
    .chapter:first-child { padding-top: 0; }
    .chapter-kicker {
      margin-bottom: 8px;
      color: var(--gold);
      font: 12px var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .chapter-intro {
      max-width: 820px;
      margin-bottom: 22px;
      color: #3f3933;
      font-size: 17px;
    }
    .prose {
      max-width: 860px;
      margin: 18px 0;
      overflow-wrap: anywhere;
    }
    .doc-frontmatter {
      max-width: 860px;
      border-left: 4px solid var(--accent);
      background: #f2fbf8;
      margin: 18px 0;
      padding: 12px 14px;
    }
    .doc-frontmatter strong {
      display: block;
      margin-bottom: 4px;
    }
    .prose h1, .prose h2, .prose h3 {
      font-family: var(--serif);
      margin: 20px 0 8px;
    }
    .prose h1 { font-size: 30px; }
    .prose h2 { font-size: 24px; }
    .prose h3 { font-size: 19px; }
    .prose p, .prose ul, .prose ol, .prose table, .prose pre {
      margin: 10px 0;
    }
    .prose li { margin: 4px 0; }
    .prose code {
      font-family: var(--mono);
      font-size: .92em;
      background: var(--soft);
      padding: 1px 4px;
      border-radius: 4px;
    }
    .prose pre {
      overflow: auto;
      border-radius: 8px;
      background: #171512;
      color: #fff8e8;
      padding: 12px;
      font: 12px/1.45 var(--mono);
    }
    .source-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .source-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 22px 0;
    }
    .stat, .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      min-width: 0;
      padding: 14px;
    }
    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      margin-bottom: 5px;
      overflow-wrap: anywhere;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      margin-top: 14px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .chart {
      position: relative;
      height: 280px;
    }
    .chart.small { height: 210px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      color: var(--muted);
      border-bottom: 2px solid var(--line);
      padding: 8px 7px;
      text-align: left;
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    td {
      border-bottom: 1px solid #eee8dd;
      padding: 8px 7px;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    tr:hover td { background: #faf6ef; }
    .right { text-align: right; }
    .mono {
      font-family: var(--mono);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      padding: 2px 7px;
      font-size: 11px;
      white-space: nowrap;
    }
    .pill.good { color: var(--good); background: #e8f5ec; }
    .pill.warn { color: var(--warn); background: #fff1db; }
    .pill.bad { color: var(--bad); background: #fde7e7; }
    .event {
      display: grid;
      grid-template-columns: 120px 110px minmax(0, 1fr);
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #eee8dd;
      font-size: 13px;
    }
    .sample {
      border-left: 3px solid var(--accent);
      padding: 8px 0 8px 12px;
      margin: 8px 0;
      background: #fbf7ef;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty {
      color: var(--muted);
      padding: 18px 0;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: minmax(0, 1fr); }
      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      button { width: 100%; }
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .event { grid-template-columns: 1fr; }
      .prose pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1>Lab Book</h1>
      <p class="subtitle">A narrative dashboard over the current Firebase schema and Hugging Face archive pointers.</p>
      <nav id="toc" class="toc" aria-label="Table of contents"></nav>
      <div class="tools">
        <input id="filter" placeholder="Filter chapters and tables">
        <button id="refresh" class="primary">Refresh</button>
      </div>
      <div id="load-meta" class="load-meta">Waiting for data.</div>
    </aside>
    <main id="book"></main>
  </div>

  <script id="chapter-template" type="text/x-handlebars-template">
    <article id="{{id}}" class="chapter" data-filter="{{filterText}}">
      <div class="chapter-kicker">Chapter {{number}}</div>
      <h2>{{title}}</h2>
      <p class="chapter-intro">{{intro}}</p>
      {{{body}}}
    </article>
  </script>

  <script>
    const FB = "https://signaling-dcfad-default-rtdb.europe-west1.firebasedatabase.app";
    const COLORS = ["#0f766e", "#7c3aed", "#b45309", "#2563eb", "#be123c", "#15803d", "#9333ea", "#0369a1"];
    const chartRefs = [];
    const MARKDOWN_SOURCES = [
      { id: "repo-index", title: "Repository Index", path: "index.md", group: "overview" },
      { id: "vision", title: "Vision", path: "VISION.md", group: "overview" },
      { id: "findings", title: "Root Findings", path: "findings.md", group: "overview" },
      { id: "ch01", title: "GA: GA tournament", path: "experiments/01_ga_tournament/README.md", group: "experiment", experiment: "ga_tournament", finding: "docs/findings/ga_tournament.md" },
      { id: "ch02", title: "PTX: PTX engine", path: "experiments/02_ptx_engine/README.md", group: "experiment", experiment: "ptx_engine" },
      { id: "ch03", title: "Synapse: Synapse parity", path: "experiments/03_synapse_parity/README.md", group: "experiment", experiment: "synapse_parity", finding: "docs/findings/synapse.md" },
      { id: "ch04", title: "Hanoi: Hanoi", path: "experiments/04_hanoi/README.md", group: "experiment", experiment: "hanoi", finding: "docs/findings/hanoi.md" },
      { id: "ch05", title: "Lego: Lego library", path: "experiments/05_lego_library/README.md", group: "experiment", experiment: "lego", finding: "docs/findings/lego.md" },
      { id: "ch06", title: "Cortex: Cortex existence", path: "experiments/06_cortex_existence/README.md", group: "experiment", experiment: "cortex", finding: "docs/findings/cortex.md" },
      { id: "ch07", title: "JEPA: JEPA", path: "experiments/07_jepa/README.md", group: "experiment", experiment: "jepa" },
      { id: "ch08", title: "RLF: RLF Cortex", path: "experiments/08_rlf_cortex/README.md", group: "experiment", experiment: "rlf_cortex" },
      { id: "ch09", title: "Bilingual: Cortex bilingual", path: "experiments/09_cortex_bilingual/README.md", group: "experiment", experiment: "cortex_bilingual" },
      { id: "ch10", title: "Structured JEPA: JEPA structured-data", path: "experiments/10_jepa_structured/README.md", group: "experiment", experiment: "jepa_structured" },
      { id: "kappa", title: "Kappa Architecture", path: "docs/KAPPA_ARCHITECTURE.md", group: "architecture" },
      { id: "cloud", title: "Cloud Archive", path: "docs/CLOUD_ARCHIVE.md", group: "architecture" },
      { id: "lab-run", title: "Lab Run and Book", path: "docs/LAB_RUN_AND_BOOK.md", group: "architecture" },
      { id: "schema", title: "Firebase Schema", path: "docs/EXPERIMENT_FIREBASE_SCHEMA.md", group: "architecture" },
      { id: "event-catalog", title: "Event Catalog", path: "docs/EVENT_CATALOG.md", group: "architecture" },
      { id: "ui", title: "UI Vision", path: "docs/UI_VISION.md", group: "architecture" },
      { id: "signoff-kappa", title: "Kappa Signoff", path: "signoff/2026-04-30-kappa-architecture-and-widerN-experiment.md", group: "signoff" },
      { id: "signoff-bilingual", title: "Bilingual Harness Signoff", path: "signoff/2026-04-29-bilingual-five-tool-harness-and-honest-composition.md", group: "signoff" },
      { id: "signoff-counter", title: "Counter Attach Signoff", path: "signoff/2026-04-29-cortex-counter-attach-on-bilingual-lm.md", group: "signoff" },
    ];
    const CHAPTER_SOURCE_ORDER = new Map(MARKDOWN_SOURCES.map((src, i) => [src.id, i]));
    const state = {
      snapshot: {},
      threePop: {},
      learningRate: {},
      mambaMeta: {},
      models: {},
      lineage: {},
      history: {},
      taskSeries: {},
      bandwidth: {},
      mambaState: {},
      mamba3RootKeys: {},
      rawTeacherBlobKeys: {},
      rootStreams: {},
      signals: {},
      messages: {},
      mambaExperiments: {},
      events: {},
      gpuHistory: {},
      nodes: {},
      teacherBlobs: {},
      experiments: {},
      streamsMeta: {},
      schemas: {},
      markdown: {},
      filter: "",
    };
    const $ = (id) => document.getElementById(id);
    const tpl = Handlebars.compile($("chapter-template").innerHTML);

    Handlebars.registerHelper("safe", (html) => new Handlebars.SafeString(html));

    function esc(v) {
      return String(v ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      })[c]);
    }
    function pct(v) {
      const n = Number(v || 0);
      return `${Math.round(n * 100)}%`;
    }
    function num(v) {
      const n = Number(v || 0);
      return Number.isFinite(n) ? n.toLocaleString() : "";
    }
    function ts(v) {
      const n = Number(v || 0);
      if (!n) return "";
      return new Date(n * 1000).toLocaleString();
    }
    function ageClass(t) {
      const n = Number(t || 0);
      if (!n) return "bad";
      const age = Date.now() / 1000 - n;
      if (age < 120) return "good";
      if (age < 600) return "warn";
      return "bad";
    }
    async function get(path) {
      const res = await fetch(`${FB}/${path}.json`, { cache: "no-store" });
      if (!res.ok) throw new Error(`${path}: ${res.status}`);
      return await res.json();
    }
    async function getShallow(path) {
      const res = await fetch(`${FB}/${path}.json?shallow=true`, { cache: "no-store" });
      if (!res.ok) throw new Error(`${path}: ${res.status}`);
      return await res.json();
    }
    async function getText(path) {
      const res = await fetch(`/${path}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`${path}: ${res.status}`);
      return await res.text();
    }
    async function getAll() {
      $("load-meta").textContent = "Loading Firebase chapters...";
      const [
        snapshot, threePop, mambaExperiments, events, gpuHistory,
        nodes, teacherBlobs, experiments, streamsMeta, schemas,
        learningRate, mambaMeta, models, lineage, history, taskSeries,
        bandwidth, mambaState, mamba3RootKeys, rawTeacherBlobKeys, rootStreams, signals, messages
      ] = await Promise.all([
        get("mamba3/snapshot").catch(() => ({})),
        get("mamba3/three_pop").catch(() => ({})),
        get("mamba3/experiments").catch(() => ({})),
        get("mamba3/events").catch(() => ({})),
        get("mamba3/gpu_history").catch(() => ({})),
        get("mamba3/nodes").catch(() => ({})),
        get("mamba3/teacher_blobs_meta").catch(() => ({})),
        get("experiments").catch(() => ({})),
        get("streams_meta").catch(() => ({})),
        get("_schemas").catch(() => ({})),
        get("mamba3/learning_rate").catch(() => ({})),
        get("mamba3/meta").catch(() => ({})),
        get("mamba3/models").catch(() => ({})),
        get("mamba3/lineage").catch(() => ({})),
        get("mamba3/history").catch(() => ({})),
        get("mamba3/task_series").catch(() => ({})),
        get("mamba3/bandwidth").catch(() => ({})),
        get("mamba3/state").catch(() => ({})),
        getShallow("mamba3").catch(() => ({})),
        getShallow("mamba3/teacher_blobs").catch(() => ({})),
        getShallow("streams").catch(() => ({})),
        getShallow("signals").catch(() => ({})),
        getShallow("messages").catch(() => ({})),
      ]);
      Object.assign(state, {
        snapshot: snapshot || {},
        threePop: threePop || {},
        learningRate: learningRate || {},
        mambaMeta: mambaMeta || {},
        models: models || {},
        lineage: lineage || {},
        history: history || {},
        taskSeries: taskSeries || {},
        bandwidth: bandwidth || {},
        mambaState: mambaState || {},
        mamba3RootKeys: mamba3RootKeys || {},
        rawTeacherBlobKeys: rawTeacherBlobKeys || {},
        rootStreams: rootStreams || {},
        signals: signals || {},
        messages: messages || {},
        mambaExperiments: mambaExperiments || {},
        events: events || {},
        gpuHistory: gpuHistory || {},
        nodes: nodes || {},
        teacherBlobs: teacherBlobs || {},
        experiments: experiments || {},
        streamsMeta: streamsMeta || {},
        schemas: schemas || {},
      });
      state.markdown = {};
      const markdownPaths = [...new Set(MARKDOWN_SOURCES.flatMap(src => [
        src.path,
        src.finding || null,
      ]).filter(Boolean))];
      const markdownPairs = await Promise.all(markdownPaths.map(async (path) => {
        try {
          return [path, await getText(path)];
        } catch {
          return [path, ""];
        }
      }));
      for (const [path, text] of markdownPairs) {
        state.markdown[path] = text;
      }
      $("load-meta").textContent = `Loaded ${new Date().toLocaleTimeString()}`;
    }
    function rows(obj) {
      if (!obj) return [];
      if (Array.isArray(obj)) {
        return obj.map((v, i) => v == null ? null : { key: String(i), value: v }).filter(Boolean);
      }
      return Object.entries(obj).map(([key, value]) => ({ key, value }));
    }
    function table(headers, bodyRows, empty = "No data available") {
      if (!bodyRows.length) return `<div class="empty">${empty}</div>`;
      return `<table><thead><tr>${headers.map(h => `<th class="${h.cls || ""}">${esc(h.label)}</th>`).join("")}</tr></thead><tbody>${bodyRows.join("")}</tbody></table>`;
    }
    function statGrid(items) {
      return `<div class="stat-grid">${items.map(([label, value]) => `<div class="stat"><strong>${esc(value)}</strong><span>${esc(label)}</span></div>`).join("")}</div>`;
    }
    function canvas(id, small = false) {
      return `<div class="chart ${small ? "small" : ""}"><canvas id="${id}"></canvas></div>`;
    }
    function parseFrontMatter(text) {
      if (!text.startsWith("---\n")) return { attrs: {}, body: text };
      const end = text.indexOf("\n---", 4);
      if (end < 0) return { attrs: {}, body: text };
      const raw = text.slice(4, end).trim();
      const attrs = {};
      for (const line of raw.split(/\r?\n/)) {
        const match = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
        if (!match) continue;
        let value = match[2].trim();
        if ((value.startsWith("\"") && value.endsWith("\"")) || (value.startsWith("'") && value.endsWith("'"))) {
          value = value.slice(1, -1);
        }
        attrs[match[1]] = value;
      }
      const bodyStart = text.indexOf("\n", end + 4);
      return { attrs, body: bodyStart >= 0 ? text.slice(bodyStart + 1) : "" };
    }
    function templateContext(path, attrs = {}) {
      const snapshot = state.snapshot || {};
      const three = state.threePop || {};
      const tasks = Object.entries(three.tasks || snapshot.tasks || {});
      const mastered = tasks.filter(([, t]) => t?.status === "mastered" || Number(t?.best_accuracy ?? t?.acc ?? 0) >= 0.99);
      return {
        doc: { path, ...attrs },
        lab: {
          tasksTracked: tasks.length || (snapshot.leaderboard || []).length,
          mastered: mastered.length,
          workers: three.n_workers ?? snapshot.n_running ?? 0,
          teachers: three.n_teachers ?? snapshot?.three_pop?.n_teachers ?? 0,
          models: rows(state.models).length,
          streams: flattenStreams().length,
          labRuns: flattenExperimentRuns().length,
          schemas: rows(state.schemas).length,
        },
        firebase: {
          mamba3Roots: rows(state.mamba3RootKeys).length,
          rawTeacherBlobTasks: rows(state.rawTeacherBlobKeys).length,
          rootStreams: rows(state.rootStreams).length,
          signals: rows(state.signals).length,
          messages: rows(state.messages).length,
        },
      };
    }
    function renderTemplate(text, context) {
      try {
        return Handlebars.compile(text, { noEscape: true })(context);
      } catch (err) {
        return `${text}\n\n_Template error: ${err.message}_`;
      }
    }
    function md(path) {
      const text = state.markdown[path] || "";
      if (!text) return `<div class="empty">Markdown source unavailable: ${esc(path)}</div>`;
      const parsed = parseFrontMatter(text);
      const context = templateContext(path, parsed.attrs);
      const summary = parsed.attrs.summary
        ? `<div class="doc-frontmatter"><strong>${esc(parsed.attrs.title || "Chapter summary")}</strong>${esc(renderTemplate(parsed.attrs.summary, context))}</div>`
        : "";
      return `${summary}<div class="prose">${marked.parse(renderTemplate(parsed.body, context))}</div>`;
    }
    function sourceCards(sources) {
      return `<div class="source-list">${sources.map(src => `<div class="source-card"><div class="mono">${esc(src.path)}</div><strong>${esc(src.title)}</strong></div>`).join("")}</div>`;
    }
    function tocGroup(chapter) {
      if (chapter.id === "chapter-prologue") return { key: "Opening", open: true };
      if (chapter.id === "doc-ch01" || chapter.id === "chapter-curriculum" || chapter.id === "chapter-legacy-experiments") return { key: "01 - GA tournament", open: true };
      if (chapter.id.startsWith("exp-")) return { key: "01B - Task run appendix", open: false, sub: true };
      if (chapter.id.startsWith("doc-ch")) return { key: "02-10 - Experiment chapters", open: true };
      return { key: "Platform and archive", open: true };
    }
    function renderToc(chapters) {
      const grouped = [];
      for (const chapter of chapters) {
        const group = tocGroup(chapter);
        let bucket = grouped.find(item => item.key === group.key);
        if (!bucket) {
          bucket = { ...group, items: [] };
          grouped.push(bucket);
        }
        bucket.items.push(chapter);
      }
      return grouped.map(group => {
        const links = group.items.map(ch => `<a href="#${esc(ch.id)}">Chapter ${ch.number}: ${esc(ch.title.replace(/^Chapter \d+:\s*/, ""))}</a>`).join("");
        return `<details class="toc-group ${group.sub ? "toc-sub" : ""}" ${group.open ? "open" : ""}>
          <summary>${esc(group.key)}<span class="toc-group-count">${num(group.items.length)}</span></summary>
          <div class="toc-group-body">${links}</div>
        </details>`;
      }).join("");
    }
    function renderChart(id, config) {
      const el = document.getElementById(id);
      if (!el) return;
      chartRefs.push(new Chart(el, config));
    }
    function lineChart(id, labels, datasets, yTitle = "") {
      renderChart(id, {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 10 } } } },
          scales: {
            x: { ticks: { maxTicksLimit: 8 } },
            y: { title: { display: Boolean(yTitle), text: yTitle } }
          }
        }
      });
    }
    function barChart(id, labels, data, label, max = 100) {
      renderChart(id, {
        type: "bar",
        data: {
          labels,
          datasets: [{ label, data, backgroundColor: "#0f766e" }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: { legend: { display: false } },
          scales: { y: { min: 0, max } }
        }
      });
    }
    function flattenLegacyExperiments() {
      return rows(state.mambaExperiments).map(({ key, value }) => ({
        id: key,
        ...value,
        cycles: rows(value?.cycles).map(r => ({ cycle: Number(r.key), ...(r.value || {}) }))
          .filter(r => Number.isFinite(r.cycle))
          .sort((a, b) => a.cycle - b.cycle),
      })).sort((a, b) => {
        const at = a.cycles[0]?.t || Number.MAX_SAFE_INTEGER;
        const bt = b.cycles[0]?.t || Number.MAX_SAFE_INTEGER;
        return at - bt || a.id.localeCompare(b.id);
      });
    }
    function flattenExperimentRuns() {
      const out = [];
      for (const [experimentId, exp] of Object.entries(state.experiments || {})) {
        for (const [runId, run] of Object.entries(exp?.runs || {})) {
          out.push({
            experimentId,
            runId,
            name: exp?.meta?.name || experimentId,
            kind: exp?.meta?.kind || "",
            hypothesis: exp?.meta?.hypothesis || "",
            meta: run?.meta || {},
            status: run?.status || {},
          });
        }
      }
      return out.sort((a, b) => (b.meta?.started_at || 0) - (a.meta?.started_at || 0));
    }
    function flattenStreams() {
      const out = [];
      for (const [experimentId, runs] of Object.entries(state.streamsMeta || {})) {
        for (const [runId, streams] of Object.entries(runs || {})) {
          for (const [stream, meta] of Object.entries(streams || {})) {
            out.push({ experimentId, runId, stream, ...(meta || {}) });
          }
        }
      }
      return out.sort((a, b) => (b.last_pack_at || 0) - (a.last_pack_at || 0));
    }
    function eventRows(limit = 80) {
      return rows(state.events).map(({ key, value }) => ({ key, ...(value || {}) }))
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).slice(0, limit);
    }
    function addChapter(chapters, id, title, intro, body) {
      chapters.push({
        id,
        number: chapters.length + 1,
        title,
        intro,
        body,
        filterText: `${title} ${intro} ${body.replace(/<[^>]+>/g, " ")}`.toLowerCase(),
      });
    }
    function buildBook() {
      chartRefs.splice(0).forEach(c => c.destroy());
      const chapters = [];
      const snapshot = state.snapshot || {};
      const three = state.threePop || {};
      const tasks = Object.entries(three.tasks || snapshot.tasks || {})
        .map(([task, info]) => ({ task, ...(info || {}) }))
        .sort((a, b) => (b.best_accuracy ?? b.acc ?? 0) - (a.best_accuracy ?? a.acc ?? 0));
      const mastered = tasks.filter(t => t.status === "mastered" || Number(t.best_accuracy ?? t.acc ?? 0) >= 0.99);
      const legacy = flattenLegacyExperiments();
      const runs = flattenExperimentRuns();
      const streams = flattenStreams();
      const events = eventRows();
      const nodes = rows(state.nodes).map(({ key, value }) => ({ id: key, ...(value || {}) }));
      const schemas = rows(state.schemas);
      const modelCount = rows(state.models).length;
      const lineageCount = rows(state.lineage).length;
      const historyCount = rows(state.history).length;
      const taskSeriesCount = rows(state.taskSeries).length;

      addChapter(chapters, "chapter-prologue", "Prologue: System State",
        "This opening chapter summarizes the whole lab using the current Firebase feed: task mastery, active workers, archive streams, nodes, and recent events.",
        md("index.md") +
        statGrid([
          ["Tasks tracked", tasks.length || (snapshot.leaderboard || []).length],
          ["Mastered", mastered.length],
          ["Workers", three.n_workers ?? snapshot.n_running ?? 0],
          ["Teachers", three.n_teachers ?? snapshot?.three_pop?.n_teachers ?? 0],
          ["Legacy experiments", legacy.length],
          ["Lab runs", runs.length],
          ["Streams", streams.length],
          ["Schemas", schemas.length],
          ["Models", modelCount],
          ["Lineage entries", lineageCount],
        ]) +
        `<div class="grid-2">
          <div class="panel"><h3>Current Task Accuracy</h3>${canvas("chart-overview-tasks")}</div>
          <div class="panel"><h3>GPU / Memory History</h3>${canvas("chart-overview-gpu")}</div>
        </div>
        <div class="panel"><h3>Recent Events</h3>${renderEvents(events.slice(0, 18))}</div>`
      );

      for (const src of MARKDOWN_SOURCES.filter(s => s.group === "experiment")) {
        const relatedLegacy = legacy.filter(exp => {
          const key = src.experiment || "";
          return exp.id.includes(key) || key.includes(exp.id) || exp.id.includes(src.id);
        });
        const chartId = `chart-md-${src.id}`;
        const finding = src.finding ? md(src.finding) : "";
        const relatedPanel = relatedLegacy.length ? `<div class="grid-2"><div class="panel"><h3>Matching Firebase Records</h3>${table([
          { label: "Live Experiment" }, { label: "Best", cls: "right" }, { label: "Cycles", cls: "right" }
        ], relatedLegacy.map(exp => `<tr><td class="mono">${esc(exp.id)}</td><td class="right">${pct(exp.best_fresh)}</td><td class="right">${num(exp.cycles.length)}</td></tr>`))}</div><div class="panel"><h3>Best Fresh Curves</h3>${canvas(chartId, true)}</div></div>` : "";
        addChapter(chapters, `doc-${src.id}`, src.title,
          "Narrative material from the repository, paired with any matching live Firebase data.",
          md(src.path) +
          relatedPanel +
          finding);

        if (src.id === "ch01") {
          addChapter(chapters, "chapter-curriculum", "01A - Curriculum Map",
            "The three-population curriculum belongs to the GA/evolution era. This chapter uses `/mamba3/three_pop`, `/mamba3/snapshot`, teacher metadata, and events before asking for any new schema.",
            `<div class="panel">${table([
              { label: "Task" }, { label: "Status" }, { label: "Accuracy", cls: "right" },
              { label: "Cycles", cls: "right" }, { label: "Node" }, { label: "Config" }
            ], tasks.map(t => {
              const acc = Number(t.best_accuracy ?? t.acc ?? 0);
              const cls = acc >= .99 ? "good" : acc >= .7 ? "warn" : "bad";
              const cfg = t.config || {};
              return `<tr><td class="mono">${esc(t.task)}</td><td><span class="pill ${cls}">${esc(t.status || "tracked")}</span></td><td class="right">${pct(acc)}</td><td class="right">${num(t.total_cycles)}</td><td>${esc(t.node || "")}</td><td class="mono">d=${esc(cfg.d_model || "")} L=${esc(cfg.n_kernel_layers || "")} ${esc(cfg.optimizer || "")}</td></tr>`;
            }))}</div>
            <div class="grid-2">
              <div class="panel"><h3>Leaderboard</h3>${canvas("chart-curriculum-leaderboard")}</div>
              <div class="panel"><h3>Learning Rate</h3>${renderLearningRate()}</div>
            </div>`
          );

          addChapter(chapters, "chapter-legacy-experiments", "01B - Live Evolution Task Runs",
            "These task-level chapters are ordered by their first recorded cycle timestamp, so the live appendix follows the run history rather than the leaderboard.",
            `<div class="grid-2">
              <div class="panel"><h3>Task Runs</h3>${table([
                { label: "Experiment" }, { label: "First Seen" }, { label: "Best", cls: "right" }, { label: "History", cls: "right" }
              ], legacy.map(exp => `<tr><td class="mono"><a href="#exp-${esc(exp.id)}">${esc(exp.id)}</a></td><td>${esc(ts(exp.cycles[0]?.t))}</td><td class="right">${pct(exp.best_fresh)}</td><td class="right">${num(exp.cycles.length)}</td></tr>`))}</div>
              <div class="panel"><h3>Model Catalog</h3>${renderModels()}</div>
            </div>`
          );

          for (const [i, exp] of legacy.entries()) {
            if (state.filter && !exp.id.toLowerCase().includes(state.filter)) continue;
            const last = exp.cycles[exp.cycles.length - 1] || {};
            const expEvents = events.filter(e => e.exp_id === exp.id).slice(0, 18);
            const body = statGrid([
              ["First seen", ts(exp.cycles[0]?.t)],
              ["Best fresh", pct(exp.best_fresh)],
              ["Cycles", exp.cycles.length],
              ["Last loss", Number(last.loss || 0).toFixed(4)],
            ]) +
            `<div class="grid-2">
              <div class="panel"><h3>Fresh Accuracy</h3>${canvas(`chart-exp-fresh-${i}`)}</div>
              <div class="panel"><h3>Loss</h3>${canvas(`chart-exp-loss-${i}`)}</div>
            </div>` +
            (expEvents.length ? `<div class="panel"><h3>Experiment Events</h3>${renderEvents(expEvents)}</div>` : "");
            addChapter(chapters, `exp-${exp.id}`, `01B.${String(i + 1).padStart(2, "0")} - ${exp.id}`,
              "A live task-run chapter reconstructed from existing cycle history and events.",
              body);
          }
        }
      }

      addChapter(chapters, "chapter-lab-runs", "Lab Runs and Streams",
        "This chapter uses the newer `/experiments`, `/streams_meta`, and archive pointers written by the current Lab run facade. It keeps the schema stable while making Firebase and Hugging Face feel like one surface.",
        md("docs/LAB_RUN_AND_BOOK.md") +
        `<div class="panel">${table([
          { label: "Run" }, { label: "Kind" }, { label: "State" }, { label: "Started" }, { label: "Purpose" }
        ], runs.map(r => `<tr><td><div class="mono">${esc(r.experimentId)}</div><div class="mono">${esc(r.runId)}</div></td><td>${esc(r.kind)}</td><td><span class="pill ${r.meta.final_state === "completed" ? "good" : "warn"}">${esc(r.meta.final_state || r.status.state || "running")}</span></td><td>${esc(ts(r.meta.started_at))}</td><td>${esc(r.meta.purpose || r.hypothesis || "")}</td></tr>`))}</div>
        <div class="grid-2">
          <div class="panel"><h3>Open Stream Records</h3>${canvas("chart-stream-records", true)}</div>
          <div class="panel"><h3>Archive Pack Progress</h3>${canvas("chart-stream-progress", true)}</div>
        </div>
        <div class="panel"><h3>Stream Archive Pointers</h3>${renderStreams(streams)}</div>`
      );

      addChapter(chapters, "chapter-archive", "Archive",
        "The archive chapter uses existing `streams_meta` Hugging Face pointers and teacher blob metadata. It is intentionally v1-first; v2 sealed shard records can enrich this later.",
        md("docs/CLOUD_ARCHIVE.md") +
        `<div class="grid-2">
          <div class="panel"><h3>Hugging Face Stream Shards</h3>${renderArchive(streams)}</div>
          <div class="panel"><h3>Firebase Teacher Blob Manifests</h3>${renderTeacherBlobs()}</div>
        </div>`
      );

      addChapter(chapters, "chapter-infrastructure", "Infrastructure",
        "Nodes, schemas, and protocol documents are part of the story because they explain why data appears where it does.",
        md("docs/KAPPA_ARCHITECTURE.md") +
        `<div class="grid-2">
          <div class="panel"><h3>Nodes</h3>${renderNodes(nodes)}</div>
          <div class="panel"><h3>Published Schemas</h3>${renderSchemas()}</div>
        </div>
        <div class="grid-2">
          <div class="panel"><h3>Self-Describing Firebase Meta</h3>${renderMeta()}</div>
          <div class="panel"><h3>Data Coverage</h3>${renderCoverage({modelCount, lineageCount, historyCount, taskSeriesCount})}</div>
        </div>
        <div class="grid-2">
          <div class="panel"><h3>Model Catalog Sizes</h3>${canvas("chart-model-sizes", true)}</div>
          <div class="panel"><h3>Learning Cycles to Mastery</h3>${canvas("chart-learning-cycles", true)}</div>
        </div>
        <div class="panel"><h3>Firebase Surface Coverage</h3>${renderFirebaseSurface()}</div>
        ${md("docs/EVENT_CATALOG.md")}`
      );

      const q = state.filter.trim().toLowerCase();
      const visible = q ? chapters.filter(ch => ch.filterText.includes(q)) : chapters;
      $("book").innerHTML = visible.map(ch => tpl(ch)).join("") || `<div class="empty">No chapters match the filter.</div>`;
      $("toc").innerHTML = renderToc(visible);
      drawCharts(legacy, tasks);
    }
    function renderEvents(events) {
      if (!events.length) return `<div class="empty">No matching events.</div>`;
      return events.map(e => `<div class="event"><div class="mono">${esc(ts(e.timestamp))}</div><div><span class="pill">${esc(e.type || e.event_type || "")}</span></div><div><b>${esc(e.exp_id || "")}</b> ${esc(e.details || "")}</div></div>`).join("");
    }
    function renderTeacherBlobs() {
      const blobs = rows(state.teacherBlobs).map(({ key, value }) => ({ task: key, ...(value || {}) }))
        .sort((a, b) => a.task.localeCompare(b.task));
      return table([
        { label: "Task" }, { label: "Size", cls: "right" }, { label: "Uploaded" }, { label: "SHA" }
      ], blobs.map(b => `<tr><td class="mono">${esc(b.task)}</td><td class="right">${num(b.size)}</td><td>${esc(ts(b.uploaded_at))}</td><td class="mono">${esc(String(b.sha256 || "").slice(0, 16))}</td></tr>`), "No teacher blob manifests.");
    }
    function renderLearningRate() {
      const lr = state.learningRate || {};
      const taskRows = rows(lr.tasks).map(({ key, value }) => ({ task: key, ...(value || {}) }))
        .sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
      return statGrid([
        ["Teachers", lr.total_teachers || taskRows.length],
        ["First", lr.first_task || ""],
        ["Last", lr.last_task || ""],
        ["Ratio", lr.learning_ratio ? Number(lr.learning_ratio).toFixed(2) : ""],
      ]) + table([
        { label: "Order" }, { label: "Task" }, { label: "Cycles", cls: "right" }, { label: "Graduated" }
      ], taskRows.map(t => `<tr><td class="right">${num(t.order)}</td><td class="mono">${esc(t.task)}</td><td class="right">${num(t.cycles)}</td><td>${esc(ts(t.graduated_at))}</td></tr>`));
    }
    function renderModels(limit = 32) {
      const models = rows(state.models).map(({ key, value }) => ({ id: key, ...(value || {}) }))
        .sort((a, b) => String(a.id).localeCompare(String(b.id)));
      return table([
        { label: "Model" }, { label: "Size", cls: "right" }, { label: "Node" }, { label: "Path" }
      ], models.slice(0, limit).map(m => `<tr><td class="mono">${esc(m.id)}</td><td class="right">${m.size_kb ? `${num(Math.round(m.size_kb))} KB` : ""}</td><td>${esc(m.node || "")}</td><td class="mono">${esc(m.path || "")}</td></tr>`));
    }
    function renderMeta() {
      const meta = state.mambaMeta || {};
      const schemaRows = rows(meta.schema).map(({ key, value }) => ({ name: key, ...(value || {}) }))
        .sort((a, b) => String(a.name).localeCompare(String(b.name)));
      return statGrid([
        ["Version", meta.version || ""],
        ["Run", meta.run_name || ""],
        ["Problems", meta.usage?.total_problems || ""],
        ["Cycles", meta.usage?.total_cycles || ""],
      ]) + table([
        { label: "Path" }, { label: "Description" }, { label: "Fields" }
      ], schemaRows.map(s => `<tr><td class="mono">${esc(s.path || s.name)}</td><td>${esc(s.desc || "")}</td><td class="mono">${esc(s.fields || "")}</td></tr>`));
    }
    function renderCoverage(counts) {
      const m = state.mambaMeta || {};
      const b = m.bandwidth || state.bandwidth || {};
      return statGrid([
        ["Models", counts.modelCount],
        ["Lineage", counts.lineageCount],
        ["History", counts.historyCount],
        ["Task series", counts.taskSeriesCount],
        ["Last push", b.last_push_bytes ? `${num(b.last_push_bytes)} B` : ""],
        ["Daily est.", b.estimated_daily_mb ? `${b.estimated_daily_mb} MB` : ""],
        ["Monthly est.", b.estimated_monthly_gb ? `${b.estimated_monthly_gb} GB` : ""],
        ["Limit", b.limit_gb ? `${b.limit_gb} GB` : ""],
      ]);
    }
    function renderFirebaseSurface() {
      const usedMamba3 = [
        "snapshot", "three_pop", "experiments", "events", "gpu_history", "nodes",
        "teacher_blobs_meta", "learning_rate", "meta", "models", "lineage",
        "history", "task_series", "bandwidth", "state",
      ];
      const surface = [
        ["/mamba3 roots", rows(state.mamba3RootKeys).length, "Mapped", "Main live control plane used across the book."],
        ["/mamba3/teacher_blobs", rows(state.rawTeacherBlobKeys).length, "Surfaced", "Raw teacher blob task keys are counted; compact metadata renders in Archive."],
        ["/streams", rows(state.rootStreams).length, "Surfaced", "Root stream namespaces are counted; durable archive pointers render from /streams_meta."],
        ["/signals", rows(state.signals).length, "Surfaced", "Signal namespaces are visible as integration surface, but not mixed into experiment chapters."],
        ["/messages", rows(state.messages).length, "Surfaced", "Message namespaces are visible as integration surface, but not mixed into experiment chapters."],
        ["Used /mamba3 paths", usedMamba3.length, "Rendered", usedMamba3.join(", ")],
      ];
      return table([
        { label: "Firebase path" }, { label: "Records", cls: "right" }, { label: "Book use" }, { label: "Notes" }
      ], surface.map(([path, count, status, notes]) => `<tr><td class="mono">${esc(path)}</td><td class="right">${num(count)}</td><td><span class="pill good">${esc(status)}</span></td><td>${esc(notes)}</td></tr>`));
    }
    function renderStreams(streams) {
      return table([
        { label: "Stream" }, { label: "Run" }, { label: "Open", cls: "right" }, { label: "Pack" }, { label: "Last Shard" }
      ], streams.map(s => `<tr><td><span class="pill">${esc(s.stream)}</span></td><td><div class="mono">${esc(s.experiment_id || s.experimentId)}</div><div class="mono">${esc(s.run_id || s.runId)}</div></td><td class="right">${num(s.current_record_count)}</td><td>${esc(s.pack_progress_pct || 0)}%</td><td class="mono">${esc(s.last_pack_filename || "open")}</td></tr>`));
    }
    function renderArchive(streams) {
      return table([
        { label: "Shard" }, { label: "Bucket" }, { label: "Prefix" }, { label: "Link" }
      ], streams.map(s => {
        const file = s.last_pack_filename;
        const browse = file && s.url_browse_template ? s.url_browse_template.replace("{filename}", file) : "";
        return `<tr><td class="mono">${esc(file || "open")}</td><td class="mono">${esc(s.hf_user)}/${esc(s.hf_bucket)}</td><td class="mono">${esc(s.prefix)}</td><td>${browse ? `<a href="${esc(browse)}" target="_blank" rel="noreferrer">open</a>` : ""}</td></tr>`;
      }));
    }
    function renderNodes(nodes) {
      return table([
        { label: "Node" }, { label: "Status" }, { label: "Backends" }, { label: "VRAM", cls: "right" }
      ], nodes.sort((a, b) => (b.last_heartbeat || 0) - (a.last_heartbeat || 0)).map(n => `<tr><td><div class="mono">${esc(n.id)}</div><div>${esc(n.gpu_name || n.arch || "")}</div></td><td><span class="pill ${ageClass(n.last_heartbeat)}">${esc(n.status || ageClass(n.last_heartbeat))}</span><div>${esc(ts(n.last_heartbeat))}</div></td><td>${esc((n.backends || []).join(", "))}</td><td class="right">${n.vram_mb ? `${Math.round(n.vram_mb / 1024)} GB` : ""}</td></tr>`));
    }
    function renderSchemas() {
      const out = [];
      for (const [name, versions] of Object.entries(state.schemas || {})) {
        for (const [version, doc] of Object.entries(versions || {})) {
          out.push(`<tr><td class="mono">${esc(name)}</td><td class="mono">${esc(version)}</td><td>${esc(doc.title || "")}</td></tr>`);
        }
      }
      return table([{ label: "Name" }, { label: "Version" }, { label: "Title" }], out);
    }
    function drawCharts(legacy, tasks) {
      const topTasks = tasks.slice(0, 30);
      barChart("chart-overview-tasks", topTasks.map(t => t.task), topTasks.map(t => Math.round(Number(t.best_accuracy ?? t.acc ?? 0) * 100)), "Accuracy");
      const streams = flattenStreams();
      const topStreams = streams.filter(s => Number(s.current_record_count || 0) > 0).slice(0, 20);
      barChart("chart-stream-records", topStreams.map(s => `${s.experimentId}/${s.stream}`), topStreams.map(s => Number(s.current_record_count || 0)), "Records", Math.max(10, ...topStreams.map(s => Number(s.current_record_count || 0))));
      barChart("chart-stream-progress", streams.slice(0, 20).map(s => `${s.experimentId}/${s.stream}`), streams.slice(0, 20).map(s => Number(s.pack_progress_pct || 0)), "Progress");
      const modelRows = rows(state.models).map(({ key, value }) => ({ id: key, ...(value || {}) }))
        .filter(m => Number(m.size_kb || 0) > 0)
        .sort((a, b) => Number(b.size_kb || 0) - Number(a.size_kb || 0))
        .slice(0, 20);
      barChart("chart-model-sizes", modelRows.map(m => m.id), modelRows.map(m => Math.round(Number(m.size_kb || 0))), "KB", Math.max(10, ...modelRows.map(m => Math.round(Number(m.size_kb || 0)))));
      const lrTasks = rows(state.learningRate?.tasks).map(({ key, value }) => ({ task: key, ...(value || {}) }))
        .filter(t => Number(t.cycles || 0) > 0)
        .sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
      barChart("chart-learning-cycles", lrTasks.map(t => t.task), lrTasks.map(t => Number(t.cycles || 0)), "Cycles", Math.max(10, ...lrTasks.map(t => Number(t.cycles || 0))));
      const gpu = rows(state.gpuHistory).map(({ key, value }) => ({ key, ...(value || {}) })).slice(-120);
      lineChart("chart-overview-gpu", gpu.map(g => g.key), [
        { label: "GPU", data: gpu.map(g => Number(g.gpu || 0)), borderColor: COLORS[0], backgroundColor: "transparent", pointRadius: 0 },
        { label: "Memory", data: gpu.map(g => Number(g.mem || 0)), borderColor: COLORS[2], backgroundColor: "transparent", pointRadius: 0 },
        { label: "Workers x5", data: gpu.map(g => Number(g.workers || 0) * 5), borderColor: COLORS[1], backgroundColor: "transparent", pointRadius: 0 },
      ], "%");
      barChart("chart-curriculum-leaderboard", topTasks.map(t => t.task), topTasks.map(t => Math.round(Number(t.best_accuracy ?? t.acc ?? 0) * 100)), "Best");
      legacy.forEach((exp, i) => {
        if (state.filter && !exp.id.toLowerCase().includes(state.filter)) return;
        const labels = exp.cycles.map(c => c.cycle);
        lineChart(`chart-exp-fresh-${i}`, labels, [
          { label: "fresh", data: exp.cycles.map(c => Math.round(Number(c.fresh || 0) * 100)), borderColor: COLORS[0], backgroundColor: "transparent", pointRadius: 0 }
        ], "%");
        lineChart(`chart-exp-loss-${i}`, labels, [
          { label: "loss", data: exp.cycles.map(c => Number(c.loss || 0)), borderColor: COLORS[2], backgroundColor: "transparent", pointRadius: 0 }
        ], "loss");
      });
      MARKDOWN_SOURCES.filter(s => s.group === "experiment").forEach(src => {
        const id = `chart-md-${src.id}`;
        const matches = legacy.filter(exp => {
          const key = src.experiment || "";
          return exp.id.includes(key) || key.includes(exp.id) || exp.id.includes(src.id);
        }).slice(0, 6);
        if (!matches.length || !document.getElementById(id)) return;
        const maxLen = Math.max(...matches.map(m => m.cycles.length));
        const labels = Array.from({ length: maxLen }, (_, i) => i + 1);
        lineChart(id, labels, matches.map((exp, i) => ({
          label: exp.id,
          data: exp.cycles.map(c => Math.round(Number(c.fresh || 0) * 100)),
          borderColor: COLORS[i % COLORS.length],
          backgroundColor: "transparent",
          pointRadius: 0,
        })), "%");
      });
    }
    function applyFilter() {
      state.filter = $("filter").value.trim().toLowerCase();
      buildBook();
    }
    $("filter").addEventListener("input", applyFilter);
    $("refresh").addEventListener("click", () => getAll().then(buildBook).catch(err => {
      $("load-meta").textContent = `Load failed: ${err.message}`;
    }));
    getAll().then(buildBook).catch(err => {
      $("load-meta").textContent = `Load failed: ${err.message}`;
    });
  </script>
</body>
</html>
