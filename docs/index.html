<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab Book</title>
  <meta name="description" content="Lab Book for the experiment archive.">
  <meta http-equiv="refresh" content="0; url=lab_book/">
  <link rel="canonical" href="lab_book/">
  <script>
    const target = new URL("lab_book/", window.location.href);
    target.search = window.location.search;
    target.hash = window.location.hash;
    window.location.replace(target);
  </script>
  <style>
    :root {
      color-scheme: light;
      --ink: #211f1b;
      --muted: #6a6257;
      --line: #ded3c4;
      --paper: #f8f3ea;
      --panel: #fffaf2;
      --accent: #7b4b1f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(520px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(42, 31, 18, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-family: Georgia, serif;
      font-size: 32px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Lab Book</h1>
    <p>Opening the experiment book.</p>
    <div class="links">
      <a href="lab_book/">Open Lab Book</a>
      <a href="legacy/curriculum_dashboard.html">Open legacy dashboard</a>
    </div>
  </main>
</body>
</html>
