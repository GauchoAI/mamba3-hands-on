<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browser Chess Expert</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.all.min.js"></script>
  <style>
    :root {
      --bg: #faf7f2;
      --panel: #fffdf8;
      --ink: #191713;
      --muted: #6f675d;
      --line: #d8d0c4;
      --accent: #0f766e;
      --light: #f0d9b5;
      --dark: #b58863;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 var(--sans);
    }
    .layout {
      display: grid;
      gap: 22px;
      grid-template-columns: minmax(320px, 560px) minmax(300px, 1fr);
      padding: clamp(14px, 3vw, 34px);
    }
    h1 {
      font: 700 clamp(32px, 5vw, 58px)/.95 var(--serif);
      margin: 0 0 10px;
    }
    p { margin: 0; }
    button, select, input {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      min-height: 38px;
      padding: 9px 10px;
    }
    button { cursor: pointer; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }
    .toolbar, .movebar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .board {
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      grid-template-rows: repeat(8, minmax(0, 1fr));
      max-width: 560px;
      position: relative;
      width: 100%;
    }
    .square {
      align-items: center;
      border: 0;
      border-radius: 0;
      display: grid;
      font-family: "Apple Symbols", "Segoe UI Symbol", "Noto Sans Symbols2", serif;
      font-size: clamp(30px, 7vw, 58px);
      justify-items: center;
      line-height: 1;
      min-height: 0;
      min-width: 0;
      padding: 0;
      position: relative;
    }
    .light { background: var(--light); }
    .dark { background: var(--dark); }
    .square.selected { outline: 4px solid var(--accent); outline-offset: -4px; }
    .square.last::after {
      border: 4px solid rgba(15, 118, 110, .75);
      content: "";
      inset: 0;
      pointer-events: none;
      position: absolute;
    }
    .square.animating-to {
      color: transparent;
    }
    .piece-ghost {
      align-items: center;
      display: grid;
      font-family: "Apple Symbols", "Segoe UI Symbol", "Noto Sans Symbols2", serif;
      font-size: clamp(30px, 7vw, 58px);
      justify-items: center;
      left: 0;
      line-height: 1;
      pointer-events: none;
      position: fixed;
      top: 0;
      transform: translate(var(--from-x), var(--from-y));
      transition: transform 220ms ease-out;
      z-index: 10;
    }
    .coord {
      color: rgba(0, 0, 0, .55);
      font: 700 10px/1 var(--sans);
      left: 4px;
      position: absolute;
      top: 4px;
    }
    .muted { color: var(--muted); }
    .mono { font-family: var(--mono); }
    .moves {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 310px;
      overflow: auto;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: var(--mono);
      padding: 4px 6px;
    }
    .grid { display: grid; gap: 14px; }
    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section>
      <h1>Browser Chess Expert</h1>
      <p class="muted">Static ONNX Runtime Web inference. The model runs in your browser, preferably through WebGPU.</p>
      <div class="toolbar">
        <select id="model"></select>
        <select id="side">
          <option value="white">Play white</option>
          <option value="black">Play black</option>
        </select>
        <button id="newBtn" class="primary">New game</button>
        <button id="flipBtn">Flip</button>
      </div>
      <div id="board" class="board" style="margin-top:14px"></div>
    </section>
    <section class="grid">
      <div class="panel">
        <strong>Status</strong>
        <p id="status" class="muted" style="margin-top:6px">Loading runtime...</p>
      </div>
      <div class="panel">
        <strong>Move</strong>
        <div class="movebar">
          <input id="moveInput" placeholder="e2e4 or Nf3" autocomplete="off">
          <button id="moveBtn" class="primary">Play</button>
        </div>
        <p class="muted" style="margin-top:8px">Click source and target squares, or type UCI/SAN. Promotions default to queen.</p>
      </div>
      <div class="panel">
        <strong>Moves</strong>
        <button id="copyPgnBtn" style="float:right; min-height:30px; padding:4px 8px">Copy PGN</button>
        <div id="moves" class="moves" style="margin-top:10px"></div>
      </div>
      <div class="panel">
        <strong>FEN</strong>
        <p id="fen" class="mono" style="margin-top:8px; overflow-wrap:anywhere"></p>
      </div>
    </section>
  </main>

  <script type="module">
    import { Chess } from "https://cdn.jsdelivr.net/npm/chess.js@1.0.0/+esm";

    const params = new URLSearchParams(location.search);
    const localAssets = params.get("localAssets") === "1";
    const ASSET_BASE = localAssets
      ? "../../experiments/12_chess_experts/checkpoints/chess_playable_assets"
      : "https://huggingface.co/miguelemosreverte/mamba3-chess-experts/resolve/main/chess_playable_assets";
    const LEGACY_BASE = "https://huggingface.co/miguelemosreverte/mamba3-chess-experts/resolve/main/chess_full_game_trace_arena";
    const MANIFEST_URL = `${ASSET_BASE}/playable_manifest.json`;
    let MODELS = {
      motif_full_trace: {
        label: "Motif full trace",
        kind: "legacy_onnx_policy",
        url: `${LEGACY_BASE}/motif_full_trace.onnx`,
        dim: 773,
        input: "board_features",
        output: "logits",
        feature: motifFeatures
      },
      jepa_full_trace: {
        label: "JEPA full trace",
        kind: "legacy_onnx_policy",
        url: `${LEGACY_BASE}/jepa_full_trace.onnx`,
        dim: 783,
        input: "board_features",
        output: "logits",
        feature: jepaFeatures
      }
    };
    let defaultModel = "motif_full_trace";
    const pieceGlyph = {
      p: "♟", n: "♞", b: "♝", r: "♜", q: "♛", k: "♚",
      P: "♙", N: "♘", B: "♗", R: "♖", Q: "♕", K: "♔"
    };
    const piecePlane = { p: 0, n: 1, b: 2, r: 3, q: 4, k: 5 };
    const pieceValue = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
    const files = "abcdefgh";
    const $ = id => document.getElementById(id);
    const state = {
      chess: new Chess(),
      sessions: {},
      selected: "",
      flipped: false,
      last: [],
      human: "white",
      provider: "",
      busy: false
    };

    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function squareIndex(square) {
      return files.indexOf(square[0]) + 8 * (Number(square[1]) - 1);
    }
    function squareFile(square) { return files.indexOf(square[0]); }
    function squareRank(square) { return Number(square[1]) - 1; }
    function castlingFlags(chess) {
      const rights = chess.fen().split(" ")[2] || "-";
      return [
        rights.includes("K") ? 1 : 0,
        rights.includes("Q") ? 1 : 0,
        rights.includes("k") ? 1 : 0,
        rights.includes("q") ? 1 : 0
      ];
    }
    function addPieces(chess, x) {
      for (let rank = 1; rank <= 8; rank++) {
        for (const file of files) {
          const square = `${file}${rank}`;
          const piece = chess.get(square);
          if (!piece) continue;
          const offset = piece.color === "w" ? 0 : 6;
          const plane = offset + piecePlane[piece.type];
          x[plane * 64 + squareIndex(square)] = 1;
        }
      }
    }
    function motifFeatures(chess) {
      const x = new Float32Array(773);
      addPieces(chess, x);
      const base = 12 * 64;
      x[base] = chess.turn() === "w" ? 1 : 0;
      const flags = castlingFlags(chess);
      for (let i = 0; i < flags.length; i++) x[base + 1 + i] = flags[i];
      return x;
    }
    function jepaFeatures(chess) {
      const x = new Float32Array(783);
      addPieces(chess, x);
      const parts = chess.fen().split(" ");
      const base = 12 * 64;
      x[base] = chess.turn() === "w" ? 1 : 0;
      const flags = castlingFlags(chess);
      for (let i = 0; i < flags.length; i++) x[base + 1 + i] = flags[i];
      const ep = parts[3];
      if (ep && ep !== "-") x[base + 5 + files.indexOf(ep[0])] = 1;
      x[base + 13] = Math.min(Number(parts[4] || 0), 100) / 100;
      x[base + 14] = Math.min(Number(parts[5] || 1), 120) / 120;
      return x;
    }
    function materialScore(chess) {
      let score = 0;
      for (let rank = 1; rank <= 8; rank++) {
        for (const file of files) {
          const piece = chess.get(`${file}${rank}`);
          if (!piece) continue;
          score += (piece.color === "w" ? 1 : -1) * pieceValue[piece.type];
        }
      }
      return score;
    }
    function materialForTurn(chess, color = chess.turn()) {
      const score = materialScore(chess);
      return color === "w" ? score : -score;
    }
    function positionKey(chess) {
      return chess.fen().split(" ").slice(0, 4).join(" ");
    }
    function mobility(chess) {
      return chess.moves({ verbose: true }).length;
    }
    function kingSafety(chess, color) {
      const board = chess.board();
      let king = "";
      for (let r = 0; r < 8; r++) {
        for (let f = 0; f < 8; f++) {
          const piece = board[r][f];
          if (piece?.type === "k" && piece.color === color) king = `${files[f]}${8 - r}`;
        }
      }
      if (!king) return -8;
      const attackers = chess.attackers ? chess.attackers(king, color === "w" ? "b" : "w").length : 0;
      let score = -1.5 * attackers;
      const file = squareFile(king);
      const rank = squareRank(king);
      const homeRank = color === "w" ? 0 : 7;
      if (rank === homeRank && [0, 1, 2, 6, 7].includes(file)) score += 0.4;
      return score;
    }
    function moved(chess, move) {
      const next = new Chess(chess.fen());
      next.move({ from: move.from, to: move.to, promotion: move.promotion || "q" });
      return next;
    }
    function captureVictim(chess, move) {
      const target = chess.get(move.to);
      if (target) return target;
      if (move.flags?.includes("e")) return { type: "p", color: chess.turn() === "w" ? "b" : "w" };
      return null;
    }
    function captureValue(chess, move) {
      const victim = captureVictim(chess, move);
      return victim ? pieceValue[victim.type] : 0;
    }
    function teacherScore(chess, move, seen = {}) {
      const beforeMaterial = materialScore(chess);
      const beforeMobility = mobility(chess);
      const mover = chess.turn();
      const after = moved(chess, move);
      if (after.isCheckmate()) return 1000;
      const drawPenalty = after.isStalemate() || after.isDraw() ? -1.2 : 0;
      let materialDelta = materialScore(after) - beforeMaterial;
      if (mover === "b") materialDelta = -materialDelta;
      let mobilityDelta = mobility(after) - beforeMobility;
      if (mover === "b") mobilityDelta = -mobilityDelta;
      let score = 2.0 * materialDelta;
      score += 0.05 * mobilityDelta;
      score += after.isCheck() ? 0.8 : 0.0;
      score += move.flags?.includes("k") || move.flags?.includes("q") ? 0.7 : 0.0;
      score += move.promotion ? 0.8 : 0.0;
      score += 0.12 * (3.5 - Math.abs(squareFile(move.to) - 3.5));
      score += 0.12 * (3.5 - Math.abs(squareRank(move.to) - 3.5));
      score += kingSafety(after, mover) - kingSafety(chess, mover);
      score -= 1.5 * (seen[positionKey(after)] || 0);
      return score + drawPenalty;
    }
    function tacticalAudit(chess, move) {
      const mover = chess.turn();
      const beforeMaterial = materialForTurn(chess, mover);
      const after = moved(chess, move);
      if (after.isCheckmate()) {
        return { opponent_best_capture: 0, opponent_best_reply_delta: 0, queen_hang: false, major_piece_hang: false, tactical_blunder: false };
      }
      let bestCapture = 0;
      let bestReplyDelta = 0;
      let queenHang = false;
      let majorHang = false;
      for (const reply of after.moves({ verbose: true })) {
        const victim = captureVictim(after, reply);
        const replyAfter = moved(after, reply);
        const replyDelta = materialForTurn(replyAfter, mover) - beforeMaterial;
        bestReplyDelta = Math.min(bestReplyDelta, replyDelta);
        if (!victim || victim.color !== mover) continue;
        const value = pieceValue[victim.type] || 0;
        bestCapture = Math.max(bestCapture, value);
        queenHang ||= victim.type === "q";
        majorHang ||= ["q", "r", "b", "n"].includes(victim.type);
      }
      const compensation = materialForTurn(after, mover) - beforeMaterial;
      const tacticalBlunder = (queenHang || bestCapture >= 5 || bestReplyDelta <= -5) && compensation < 4;
      return {
        opponent_best_capture: bestCapture,
        opponent_best_reply_delta: bestReplyDelta,
        queen_hang: queenHang,
        major_piece_hang: majorHang,
        tactical_blunder: tacticalBlunder
      };
    }
    function safetyPenalty(audit) {
      let penalty = 0;
      penalty += audit.tactical_blunder ? 6.0 : 0.0;
      penalty += audit.queen_hang ? 8.0 : 0.0;
      penalty += audit.major_piece_hang ? 1.2 : 0.0;
      penalty += 0.35 * audit.opponent_best_capture;
      penalty += 0.25 * Math.max(0, -audit.opponent_best_reply_delta);
      return penalty;
    }
    function encodeMove(move, x, base) {
      x[base + squareIndex(move.from)] = 1;
      x[base + 64 + squareIndex(move.to)] = 1;
    }
    function onlineCandidateFeatures(chess, move, heuristic) {
      const x = new Float32Array(909);
      x.set(motifFeatures(chess), 0);
      encodeMove(move, x, 773);
      const after = moved(chess, move);
      const beforeMaterial = materialForTurn(chess, chess.turn());
      const afterMaterial = materialForTurn(after, chess.turn());
      const audit = tacticalAudit(chess, move);
      const base = 773 + 128;
      x[base] = Math.max(-1, Math.min(1, heuristic / 12));
      x[base + 1] = Math.max(-1, Math.min(1, (afterMaterial - beforeMaterial) / 9));
      x[base + 2] = after.isCheck() ? 1 : 0;
      x[base + 3] = Math.max(0, Math.min(1, captureValue(chess, move) / 9));
      x[base + 4] = Math.max(0, Math.min(1, audit.opponent_best_capture / 9));
      x[base + 5] = Math.max(-1, Math.min(1, audit.opponent_best_reply_delta / 9));
      x[base + 6] = audit.queen_hang ? 1 : 0;
      x[base + 7] = audit.tactical_blunder ? 1 : 0;
      return x;
    }
    function classIndex(move) {
      return squareIndex(move.from) * 64 + squareIndex(move.to);
    }
    function pgnText() {
      const history = state.chess.history();
      const pairs = [];
      for (let i = 0; i < history.length; i += 2) {
        pairs.push(`${Math.floor(i / 2) + 1}. ${history[i]}${history[i + 1] ? " " + history[i + 1] : ""}`);
      }
      return pairs.join(" ");
    }
    function pgnHtml() {
      const history = state.chess.history();
      const pairs = [];
      for (let i = 0; i < history.length; i += 2) {
        pairs.push(`<span class="chip">${Math.floor(i / 2) + 1}. ${history[i]}${history[i + 1] ? " " + history[i + 1] : ""}</span>`);
      }
      return pairs.join("");
    }
    async function loadSession(name) {
      if (state.sessions[name]) return state.sessions[name];
      const spec = MODELS[name];
      const providers = navigator.gpu ? ["webgpu", "wasm"] : ["wasm"];
      const session = await ort.InferenceSession.create(spec.url, { executionProviders: providers });
      state.sessions[name] = session;
      state.provider = providers[0];
      return session;
    }
    async function loadManifest() {
      try {
        const response = await fetch(MANIFEST_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const manifest = await response.json();
        const next = {};
        for (const policy of manifest.policies || []) {
          const existing = MODELS[policy.id] || {};
          next[policy.id] = {
            ...existing,
            label: policy.label,
            kind: policy.kind,
            url: `${ASSET_BASE}/${policy.model.file}`,
            dim: policy.input_dim,
            input: policy.input,
            output: policy.output,
            topK: policy.top_k || existing.topK,
            valueWeight: policy.value_weight || existing.valueWeight,
            feature: policy.kind === "safety_candidate_reranker_value_head" ? onlineCandidateFeatures : existing.feature,
            kpi: policy.kpi
          };
        }
        MODELS = Object.keys(next).length ? next : MODELS;
        defaultModel = manifest.default_policy || defaultModel;
      } catch (err) {
        $("status").textContent = `Manifest unavailable, using built-in model list. ${err.message}`;
      }
      $("model").innerHTML = Object.entries(MODELS)
        .sort((a, b) => (b[1].kpi?.value || 0) - (a[1].kpi?.value || 0))
        .map(([id, spec]) => `<option value="${id}">${spec.label || id}${spec.kpi ? ` (${Math.round(spec.kpi.value * 100)}%)` : ""}</option>`)
        .join("");
      $("model").value = MODELS[defaultModel] ? defaultModel : Object.keys(MODELS)[0];
    }
    async function expertMove() {
      const name = $("model").value;
      const spec = MODELS[name];
      const session = await loadSession(name);
      const legal = state.chess.moves({ verbose: true });
      if (spec.kind === "safety_candidate_reranker_value_head") {
        const scored = legal.map(move => {
          const raw = teacherScore(state.chess, move, {});
          const audit = tacticalAudit(state.chess, move);
          return { move, raw, adjusted: raw - safetyPenalty(audit) };
        }).sort((a, b) => b.adjusted - a.adjusted).slice(0, spec.topK || 8);
        const batch = new Float32Array(scored.length * spec.dim);
        scored.forEach((row, i) => batch.set(spec.feature(state.chess, row.move, row.raw), i * spec.dim));
        const feeds = { [spec.input]: new ort.Tensor("float32", batch, [scored.length, spec.dim]) };
        const outputs = await session.run(feeds);
        const values = outputs[spec.output].data;
        scored.forEach((row, i) => {
          const h = Math.tanh((row.adjusted - scored[0].adjusted) / 6.0);
          row.mixed = h + (spec.valueWeight || 0.12) * values[i];
        });
        scored.sort((a, b) => b.mixed - a.mixed);
        const move = scored[0].move;
        state.chess.move({ from: move.from, to: move.to, promotion: move.promotion || "q" });
        state.last = [move.from, move.to];
        return move;
      }
      const x = spec.feature(state.chess);
      const feeds = { [spec.input]: new ort.Tensor("float32", x, [1, spec.dim]) };
      const outputs = await session.run(feeds);
      const logits = outputs[spec.output].data;
      legal.sort((a, b) => logits[classIndex(b)] - logits[classIndex(a)]);
      const move = legal[0];
      state.chess.move({ from: move.from, to: move.to, promotion: move.promotion || "q" });
      state.last = [move.from, move.to];
      return move;
    }
    function statusText(lastExpert = null) {
      if (state.chess.isCheckmate()) return "Checkmate.";
      if (state.chess.isStalemate()) return "Stalemate.";
      if (state.chess.isDraw()) return "Draw.";
      const side = state.chess.turn() === "w" ? "White" : "Black";
      const suffix = lastExpert ? ` Expert played ${lastExpert.san}.` : "";
      return `${side} to move.${suffix} Runtime: ${state.provider || "loading"}.`;
    }
    function moveGlyph(move) {
      const type = (move.promotion || move.piece || "").toLowerCase();
      const symbol = move.color === "w" ? type.toUpperCase() : type;
      return pieceGlyph[symbol] || "";
    }
    function animateMove(move) {
      const from = document.querySelector(`[data-square="${move.from}"]`);
      const to = document.querySelector(`[data-square="${move.to}"]`);
      const glyph = moveGlyph(move);
      if (!from || !to || !glyph || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const a = from.getBoundingClientRect();
      const b = to.getBoundingClientRect();
      const ghost = document.createElement("div");
      ghost.className = "piece-ghost";
      ghost.textContent = glyph;
      ghost.style.width = `${a.width}px`;
      ghost.style.height = `${a.height}px`;
      ghost.style.setProperty("--from-x", `${a.left}px`);
      ghost.style.setProperty("--from-y", `${a.top}px`);
      ghost.style.setProperty("--to-x", `${b.left}px`);
      ghost.style.setProperty("--to-y", `${b.top}px`);
      to.classList.add("animating-to");
      document.body.appendChild(ghost);
      requestAnimationFrame(() => {
        ghost.style.transform = "translate(var(--to-x), var(--to-y))";
      });
      setTimeout(() => {
        ghost.remove();
        to.classList.remove("animating-to");
      }, 260);
    }
    function render() {
      const ranks = state.flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
      const fileList = state.flipped ? [...files].reverse() : [...files];
      $("board").innerHTML = ranks.map(rank => fileList.map(file => {
        const square = `${file}${rank}`;
        const piece = state.chess.get(square);
        const symbol = piece ? (piece.color === "w" ? piece.type.toUpperCase() : piece.type) : "";
        const dark = (files.indexOf(file) + rank - 1) % 2 === 0;
        return `<button class="square ${dark ? "dark" : "light"} ${state.selected === square ? "selected" : ""} ${state.last.includes(square) ? "last" : ""}" data-square="${square}">
          <span class="coord">${square}</span>${pieceGlyph[symbol] || ""}
        </button>`;
      }).join("")).join("");
      $("fen").textContent = state.chess.fen();
      $("moves").innerHTML = pgnHtml();
      $("status").textContent = statusText();
    }
    function pieceBelongsToTurn(square) {
      const piece = state.chess.get(square);
      if (!piece) return false;
      return piece.color === state.chess.turn();
    }
    async function newGame() {
      state.chess = new Chess();
      state.human = $("side").value;
      state.selected = "";
      state.last = [];
      render();
      if (state.human === "black") {
        state.busy = true;
        $("status").textContent = "Expert thinking...";
        const reply = await expertMoveWithDelay();
        render();
        animateMove(reply);
        $("status").textContent = statusText(reply);
        state.busy = false;
      }
    }
    async function expertMoveWithDelay() {
      const started = performance.now();
      const move = await expertMove();
      const remaining = 1000 - (performance.now() - started);
      if (remaining > 0) await sleep(remaining);
      return move;
    }
    async function playMoveText(text) {
      if (state.busy) return;
      const moveText = text.trim();
      if (!moveText) return;
      let move = null;
      if (/^[a-h][1-8][a-h][1-8][qrbn]?$/i.test(moveText)) {
        move = state.chess.move({
          from: moveText.slice(0, 2),
          to: moveText.slice(2, 4),
          promotion: moveText[4] || "q"
        });
      } else {
        move = state.chess.move(moveText);
      }
      if (!move) throw new Error(`Illegal move: ${moveText}`);
      state.last = [move.from, move.to];
      state.selected = "";
      render();
      animateMove(move);
      let reply = null;
      if (!state.chess.isGameOver()) {
        state.busy = true;
        $("status").textContent = "Expert thinking...";
        try {
          reply = await expertMoveWithDelay();
        } finally {
          state.busy = false;
        }
      }
      $("moveInput").value = "";
      render();
      if (reply) animateMove(reply);
      $("status").textContent = statusText(reply);
    }
    $("board").addEventListener("click", event => {
      if (state.busy) return;
      const btn = event.target.closest("[data-square]");
      if (!btn) return;
      const square = btn.dataset.square;
      if (!state.selected) {
        if (!pieceBelongsToTurn(square)) {
          $("status").textContent = "Choose one of your pieces.";
          return;
        }
        state.selected = square;
        render();
        return;
      }
      if (state.selected === square) {
        state.selected = "";
        render();
        return;
      }
      if (pieceBelongsToTurn(square)) {
        state.selected = square;
        render();
        return;
      }
      playMoveText(state.selected + square).catch(err => {
        $("status").textContent = err.message;
        state.selected = "";
        render();
      });
    });
    $("moveBtn").addEventListener("click", () => {
      if (state.busy) return;
      playMoveText($("moveInput").value).catch(err => $("status").textContent = err.message);
    });
    $("moveInput").addEventListener("keydown", event => {
      if (event.key === "Enter") $("moveBtn").click();
    });
    $("newBtn").addEventListener("click", () => {
      newGame().catch(err => $("status").textContent = err.message);
    });
    $("flipBtn").addEventListener("click", () => {
      state.flipped = !state.flipped;
      render();
    });
    $("copyPgnBtn").addEventListener("click", async () => {
      const text = pgnText();
      await navigator.clipboard?.writeText(text);
      const old = $("copyPgnBtn").textContent;
      $("copyPgnBtn").textContent = "Copied";
      setTimeout(() => { $("copyPgnBtn").textContent = old; }, 900);
    });
    $("model").addEventListener("change", () => {
      $("status").textContent = "Model will change on the next expert move.";
    });

    loadManifest().then(() => newGame()).catch(err => $("status").textContent = err.message);
  </script>
</body>
</html>
