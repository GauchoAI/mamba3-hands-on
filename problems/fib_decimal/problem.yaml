name: fib_decimal
type: generator
generator: generators.level3_longrange:gen_fib_decimal
target_accuracy: 0.95
tags: [reasoning, longrange, level3, fibonacci, decimal]
description: "Fibonacci as decimal digits: 'FIBD n' -> str(F(n)). Tests per-position iter_token in LoopCounter."
curriculum:
  # Finer stage steps than v3. v3 jumped n_max 60 -> 100 and NaN'd at
  # the transition. Smaller jumps keep the SSM scan length growth
  # bounded between consecutive stages.
  - {stage: 1, n_max: 5,   advance_at: 0.95}
  - {stage: 2, n_max: 10,  advance_at: 0.95}
  - {stage: 3, n_max: 15,  advance_at: 0.95}
  - {stage: 4, n_max: 20,  advance_at: 0.90}
  - {stage: 5, n_max: 30,  advance_at: 0.90}
  - {stage: 6, n_max: 45,  advance_at: 0.90}
  - {stage: 7, n_max: 60,  advance_at: 0.90}
  - {stage: 8, n_max: 80,  advance_at: 0.90}
  - {stage: 9, n_max: 100, advance_at: 0.90}
