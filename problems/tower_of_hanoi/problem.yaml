name: tower_of_hanoi
type: generator
generator: generators.level3_longrange:gen_tower_of_hanoi
target_accuracy: 0.95
tags: [reasoning, longrange, level3]
description: "Tower of Hanoi — compute number of moves (2^n - 1)"
curriculum:
  - {stage: 1, n_disks: 3, advance_at: 0.90}
  - {stage: 2, n_disks: 5, advance_at: 0.90}
  - {stage: 3, n_disks: 8, advance_at: 0.95}
  # Extended stages — push past the digit-shortcut boundary.
  # See findings.md ("Tower-of-Hanoi cliff"): the model memorized
  # 2^last_digit-1 inside [1,8]. Stages 4+ force multi-digit input
  # so that shortcut breaks. Same model size; curriculum does the work.
  - {stage: 4, n_disks: 12, advance_at: 0.90}
  - {stage: 5, n_disks: 16, advance_at: 0.90}
  - {stage: 6, n_disks: 20, advance_at: 0.90}
