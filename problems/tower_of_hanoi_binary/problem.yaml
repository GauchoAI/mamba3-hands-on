name: tower_of_hanoi_binary
type: generator
generator: generators.level3_longrange:gen_tower_of_hanoi_binary
target_accuracy: 0.95
tags: [reasoning, longrange, level3, diagnostic]
description: "Hanoi 2^n-1 in binary — output 'n ones'. Diagnostic: removes the binary→decimal head."
curriculum:
  - {stage: 1, n_disks: 3, advance_at: 0.95}
  - {stage: 2, n_disks: 5, advance_at: 0.95}
  - {stage: 3, n_disks: 8, advance_at: 0.95}
  - {stage: 4, n_disks: 12, advance_at: 0.90}
  - {stage: 5, n_disks: 16, advance_at: 0.90}
  - {stage: 6, n_disks: 20, advance_at: 0.90}
  # Curriculum CAP at 20 — we want to test extrapolation,
  # so the model must never see n > 20 during training.
